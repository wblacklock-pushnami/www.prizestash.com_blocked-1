<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access temporarily blocked — PrizeStash</title>
  <link rel="icon" type="image/png" href="https://prizestash.com/wp-content/uploads/2023/04/cropped-PrizeStashIcon-32x32.png">
  <link rel="apple-touch-icon" href="https://prizestash.com/wp-content/uploads/2023/04/cropped-PrizeStashIcon-180x180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mada:wght@500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --push-purple: #5C3DE4;
      --dark-purple: #312679;
      --clear: #F1F1F1;
      --ink: #1E1E1F;
      --ink-2: #4a4a4d;
      --line: #d2d6e0;
      --surface: #FFFFFF;
      --purple-tint: #e6e2f8;
      --link-blue: #1d4ed8;
      --link-blue-dark: #1e3a8a;
      --blue-tint: #dbeafe;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; background: var(--surface); }
    body {
      margin: 0;
      font-family: 'Open Sans', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--clear);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .layout, .simple-layout { flex: 1 0 auto; }
    .site-footer { flex-shrink: 0; }
    h1, h2, h3 { font-family: 'Mada', sans-serif; margin: 0 0 12px; line-height: 1.25; color: var(--ink); }
    p, li { margin: 0 0 16px; }
    a { color: var(--link-blue); text-decoration: underline; text-underline-offset: 2px; }
    a:hover { color: var(--link-blue-dark); }
    a:focus-visible { outline: 2px solid var(--link-blue); outline-offset: 2px; border-radius: 4px; }
    main a { color: var(--link-blue); }
    main a:hover { color: var(--link-blue-dark); }

    .skip-link {
      position: absolute; left: -999px; top: 0;
      background: var(--push-purple); color: white;
      padding: 8px 12px; border-radius: 8px; z-index: 100; font-weight: 600;
    }
    .skip-link:focus { left: 8px; top: 8px; }

    /* Header */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      height: 64px;
      display: flex; align-items: center;
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 0 24px;
      display: flex; align-items: center;
    }
    .brand {
      font-family: 'Mada', sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .brand:hover { color: var(--ink); }

    /* Layout */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 64px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 48px;
    }
    .toc {
      position: sticky;
      top: 88px;
      align-self: start;
      max-height: calc(100vh - 110px);
      overflow-y: auto;
    }
    .toc h2 {
      font-family: 'Mada', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin: 0 0 12px;
    }
    .toc ol { list-style: none; padding: 0; margin: 0; }
    .toc li { margin: 0 0 4px; }
    .toc a {
      display: block;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--ink-2);
      text-decoration: none;
      border-left: 2px solid transparent;
      border-radius: 0 6px 6px 0;
      transition: all 0.15s;
    }
    .toc a:hover,
    .toc a:focus-visible {
      color: var(--link-blue);
      background: var(--blue-tint);
      border-left-color: var(--link-blue);
    }

    article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px 36px;
      max-width: 720px;
    }
    article > h1 {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      margin: 0 0 24px;
      letter-spacing: -0.01em;
      text-align: left;
    }
    article section { margin-bottom: 32px; scroll-margin-top: 80px; }
    article section:last-child { margin-bottom: 0; }
    article h2 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 12px;
      padding-top: 8px;
    }
    article h3 { font-size: 17px; font-weight: 600; margin-top: 20px; }
    article p, article li { color: var(--ink); line-height: 1.65; }
    article ul, article ol { padding-left: 22px; margin-bottom: 16px; }
    article li { margin-bottom: 6px; }
    article .intro {
      font-size: 17px;
      color: var(--ink);
      padding: 16px 20px;
      background: var(--purple-tint);
      border-radius: 8px;
      border-left: 3px solid var(--push-purple);
      margin-bottom: 24px;
    }
    .contact-block {
      padding: 16px 20px;
      background: var(--purple-tint);
      border-radius: 8px;
      margin-top: 16px;
    }
    .contact-block p { margin: 0 0 4px; }

    /* Form success state */
    .form-success {
      text-align: center;
      padding: 24px 0;
    }
    .form-success__check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: #1cb526;
      border-radius: 50%;
      margin-bottom: 16px;
    }
    .form-success__check svg { width: 36px; height: 36px; }
    .form-success h2 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    .form-success p { color: var(--ink-2); }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--line);
      padding: 32px 24px;
      background: var(--surface);
    }
    .footer-inner {
      max-width: 1000px; margin: 0 auto;
      display: flex; flex-direction: column;
      gap: 12px; align-items: center; text-align: center;
    }
    .footer-inner p { margin: 0; font-size: 13px; color: var(--ink-2); }
    .footer-links { display: flex; flex-wrap: wrap; justify-content: center; }
    .footer-links a {
      color: var(--ink-2); text-decoration: none;
      padding: 0 12px; border-right: 1px solid var(--line);
      font-size: 13px;
    }
    .footer-links a:last-child { border-right: none; }
    .footer-links a:hover { color: var(--link-blue); }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; gap: 0; padding: 24px 16px 48px; }
      .toc { display: none; }
      article { padding: 28px 22px; border-radius: 12px; }
    }

    .simple-layout {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }
    .simple-layout article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px 36px;
    }
    @media (max-width: 640px) {
      .simple-layout article { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a href="https://www.prizestash.com/" class="brand">PrizeStash</a>
    </div>
  </header>

  <div class="simple-layout">
    <main id="main">
      <article style="text-align:center;">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:#ffd93d;border-radius:50%;margin-bottom:20px;">
          <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#1E1E1F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <h1 style="text-align:center;margin:0 0 12px;">Something Wrong...</h1>
        <p style="color:var(--ink-2);font-size:17px;max-width:480px;margin:0 auto;">Our systems have detected unusual traffic from your network. Please try your request again later.</p>
      </article>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://prizestash.com/privacypolicy/">Privacy Policy</a>
        <a href="https://prizestash.com/sms-privacy-policy/">SMS Privacy Policy</a>
        <a href="https://prizestash.com/terms-and-conditions/">Terms &amp; Conditions</a>
        <a href="https://www.prizestash.com/ccpa/">CCPA</a>
        <a href="https://prizestash.com/contact-us/">Contact Us</a>
        <a href="https://prizestash.com/electronic-disclosure-consent-agreement/">Electronic Disclosure Consent Agreement</a>
        <a href="https://prizestash.com/unsubscribe/">Unsubscribe</a>
      </div>
      <p>© 2026 PrizeStash</p>
    </div>
  </footer>
</body>
</html>
